services:
  db:
    image: postgres:16-alpine
    container_name: vietconnect-egy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vietconnect
      POSTGRES_PASSWORD: vietconnect
      POSTGRES_DB: vietconnect_egy
    ports:
      - "5432:5432"
    volumes:
      - vietconnect_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vietconnect -d vietconnect_egy"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vietconnect-egy-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://vietconnect:vietconnect@db:5432/vietconnect_egy?schema=public"
      AUTH_SECRET: "docker-dev-secret-change-me"
      NEXTAUTH_URL: "http://localhost:3000"
      AI_PROVIDER: "mock"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_MAP_PROVIDER: "osm"
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts && npm run start"

volumes:
  vietconnect_pg_data:
